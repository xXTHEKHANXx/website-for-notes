<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UITNotes - Login / Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">📚 UITNotes</div>
        <nav>
            <ul>
                <li><a href="index.html">Browse Notes</a></li>
                <li><a href="upload.html">Upload</a></li>
                <li><a href="auth.html" class="btn btn-outline">Login / Register</a></li>
                <li><a href="admin.html" class="btn" style="background-color: var(--danger); color: white;">Admin Panel</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <section id="auth">
            <div class="auth-grid">
                <div>
                    <h2>Login</h2>
                    <form>
                        <div class="form-group">
                            <label>University Email</label>
                            <input type="email" placeholder="studentofuit@gmail.com">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" placeholder="enter your password">
                        </div>
                        <button type="button" class="btn">Login</button>
                    </form>
                </div>
                <div>
                    <h2>Register</h2>
                    <form>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" placeholder="Enter your full name">
                        </div>
                        <div class="form-group">
                            <label>University Email</label>
                            <input type="email" placeholder="studentofuit@gmail.com">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" placeholder="Create a strong alphanumeric password">
                        </div>
                        
                        <div class="captcha-mock">
                            <label class="custom-checkbox">
                                <input type="checkbox" id="human" required>
                                <span class="checkmark"></span>
                                I am human (Anti-Spam Check)
                            </label>
                        </div>

                        <button type="button" class="btn btn-outline">Create Account</button>
                    </form>
                </div>
            </div>
        </section>
    </div>

    <footer>
        <div class="footer-links">
            <a href="feedback.html">Submit Feedback</a>
            <a href="bugreport.html">Report a Bug / Error</a>
            <a href="terms.html">Terms of Service</a>
        </div>
        <p style="color: var(--text-muted); font-size: 0.9rem;">&copy; 2026 UITNotes Platform. Built for Students.</p>
    </footer>

</body>
</html>
